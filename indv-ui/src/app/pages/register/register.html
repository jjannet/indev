<div class="login-wrapper">
  <button class="theme-toggle" (click)="themeService.toggle()" type="button">
    @if (themeService.theme() === 'dark') {
      <lucide-icon [img]="icons.Sun" [size]="20"></lucide-icon>
    } @else {
      <lucide-icon [img]="icons.Moon" [size]="20"></lucide-icon>
    }
  </button>

  <div class="login-card">
    <div class="login-header">
      <h1>INDEV</h1>
      <p>สมัครสมาชิก</p>
    </div>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="fullName">ชื่อ-นามสกุล</label>
        <input
          id="fullName"
          type="text"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="กรอกชื่อ-นามสกุล"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="example@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="อย่างน้อย 8 ตัวอักษร"
            required
            minlength="8"
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()">
            @if (showPassword()) {
              <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
            } @else {
              <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
            }
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-field">
          <input
            id="confirmPassword"
            [type]="showConfirmPassword() ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="กรอกรหัสผ่านอีกครั้ง"
            required
            minlength="8"
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
            @if (showConfirmPassword()) {
              <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
            } @else {
              <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="loading() || !fullName || !email || !password || !confirmPassword"
      >
        @if (loading()) {
          <span class="spinner"></span>
          กำลังสมัคร...
        } @else {
          <lucide-icon [img]="icons.UserPlus" [size]="18"></lucide-icon>
          สมัครสมาชิก
        }
      </button>
    </form>

    <div class="login-footer">
      <span>มีบัญชีแล้ว?</span>
      <a routerLink="/login">เข้าสู่ระบบ</a>
    </div>
  </div>
</div>
