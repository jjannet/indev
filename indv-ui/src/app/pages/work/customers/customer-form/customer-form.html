<div class="page-header">
  <h1>{{ isEdit() ? 'Edit Customer' : 'New Customer' }}</h1>
  <button class="btn btn-secondary" (click)="goBack()">
    <lucide-icon [img]="icons.ArrowLeft" [size]="18"></lucide-icon>
    Back
  </button>
</div>

@if (error()) {
  <div class="error-message">{{ error() }}</div>
}

@if (loading()) {
  <p>Loading...</p>
} @else {
  <div class="form-card">
    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="code">Code *</label>
          <input id="code" type="text" [(ngModel)]="form.code" name="code" required #code="ngModel" />
          @if (code.invalid && code.touched) {
            <span class="field-error">Code is required</span>
          }
        </div>

        <div class="form-group">
          <label for="name">Name *</label>
          <input id="name" type="text" [(ngModel)]="form.name" name="name" required #name="ngModel" />
          @if (name.invalid && name.touched) {
            <span class="field-error">Name is required</span>
          }
        </div>

        <div class="form-group">
          <label for="short_name">Short Name</label>
          <input id="short_name" type="text" [(ngModel)]="form.short_name" name="short_name" />
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" [(ngModel)]="form.status" name="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="description">Description</label>
          <textarea id="description" [(ngModel)]="form.description" name="description" rows="3"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="f.invalid || saving()">
          <lucide-icon [img]="icons.Save" [size]="18"></lucide-icon>
          {{ saving() ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="goBack()">Cancel</button>
      </div>
    </form>
  </div>
}
