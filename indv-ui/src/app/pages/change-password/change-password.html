<div class="page-header">
  <h1>เปลี่ยนรหัสผ่าน</h1>
</div>

@if (error()) {
  <div class="error-message">{{ error() }}</div>
}

@if (success()) {
  <div class="success-message">{{ success() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" class="password-form">
    <div class="form-group">
      <label for="currentPassword">รหัสผ่านปัจจุบัน</label>
      <div class="password-field">
        <input
          id="currentPassword"
          [type]="showCurrent() ? 'text' : 'password'"
          [(ngModel)]="currentPassword"
          name="currentPassword"
          placeholder="กรอกรหัสผ่านปัจจุบัน"
          required
          autocomplete="current-password"
        />
        <button type="button" class="password-toggle" (click)="showCurrent.update(v => !v)">
          @if (showCurrent()) {
            <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
          } @else {
            <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
          }
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="newPassword">รหัสผ่านใหม่</label>
      <div class="password-field">
        <input
          id="newPassword"
          [type]="showNew() ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="อย่างน้อย 8 ตัวอักษร"
          required
          minlength="8"
          autocomplete="new-password"
        />
        <button type="button" class="password-toggle" (click)="showNew.update(v => !v)">
          @if (showNew()) {
            <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
          } @else {
            <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
          }
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmNewPassword">ยืนยันรหัสผ่านใหม่</label>
      <div class="password-field">
        <input
          id="confirmNewPassword"
          [type]="showConfirm() ? 'text' : 'password'"
          [(ngModel)]="confirmNewPassword"
          name="confirmNewPassword"
          placeholder="กรอกรหัสผ่านอีกครั้ง"
          required
          minlength="8"
          autocomplete="new-password"
        />
        <button type="button" class="password-toggle" (click)="showConfirm.update(v => !v)">
          @if (showConfirm()) {
            <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
          } @else {
            <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
          }
        </button>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !currentPassword || !newPassword || !confirmNewPassword">
        @if (loading()) {
          กำลังเปลี่ยน...
        } @else {
          <lucide-icon [img]="icons.KeyRound" [size]="18"></lucide-icon>
          เปลี่ยนรหัสผ่าน
        }
      </button>
    </div>
  </form>
</div>
