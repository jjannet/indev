<div class="login-wrapper">
  <button class="theme-toggle" (click)="themeService.toggle()" type="button">
    @if (themeService.theme() === 'dark') {
      <lucide-icon [img]="icons.Sun" [size]="20"></lucide-icon>
    } @else {
      <lucide-icon [img]="icons.Moon" [size]="20"></lucide-icon>
    }
  </button>

  <div class="login-card">
    <div class="login-header">
      <h1>INDEV</h1>
      <p>กรุณาเปลี่ยนรหัสผ่านก่อนใช้งาน</p>
    </div>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    @if (success()) {
      <div class="success-message">{{ success() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="newPassword">รหัสผ่านใหม่</label>
        <div class="password-field">
          <input
            id="newPassword"
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="อย่างน้อย 8 ตัวอักษร"
            required
            minlength="8"
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()">
            @if (showPassword()) {
              <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
            } @else {
              <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
            }
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmNewPassword">ยืนยันรหัสผ่านใหม่</label>
        <div class="password-field">
          <input
            id="confirmNewPassword"
            [type]="showConfirmPassword() ? 'text' : 'password'"
            [(ngModel)]="confirmNewPassword"
            name="confirmNewPassword"
            placeholder="กรอกรหัสผ่านอีกครั้ง"
            required
            minlength="8"
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
            @if (showConfirmPassword()) {
              <lucide-icon [img]="icons.EyeOff" [size]="18"></lucide-icon>
            } @else {
              <lucide-icon [img]="icons.Eye" [size]="18"></lucide-icon>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="loading() || !newPassword || !confirmNewPassword"
      >
        @if (loading()) {
          <span class="spinner"></span>
          กำลังเปลี่ยน...
        } @else {
          <lucide-icon [img]="icons.KeyRound" [size]="18"></lucide-icon>
          เปลี่ยนรหัสผ่าน
        }
      </button>
    </form>
  </div>
</div>
